{% extends "base.html" %}
{% load static %}

{% block title %}Change Password{% endblock %}

{% block content %}

<div class="password-container">
    
    <div class="password-card">
        <h2>🔐 Change Password</h2>

        <form id="changePasswordForm">
            
            <div class="input-group">
                <label>Old Password</label>
                <input type="password" id="oldPassword" required>
            </div>

            <div class="input-group">
                <label>New Password</label>
                <input type="password" id="newPassword" required>
            </div>

            <div class="input-group">
                <label>Confirm New Password</label>
                <input type="password" id="confirmPassword" required>
            </div>

            <button type="submit">Update Password</button>

            <p id="message"></p>

        </form>
    </div>

</div>

<style>

/* Center container */
.password-container {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 80vh;
    padding: 20px;
}

/* Card */
.password-card {
    background: #1e1e2f;
    padding: 30px;
    border-radius: 15px;
    width: 100%;
    max-width: 400px;
    color: white;
    box-shadow: 0 0 20px rgba(0,0,0,0.4);
}

/* Title */
.password-card h2 {
    text-align: center;
    margin-bottom: 20px;
}

/* Inputs */
.input-group {
    margin-bottom: 15px;
}

.input-group label {
    display: block;
    margin-bottom: 5px;
    font-size: 14px;
}

.input-group input {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: none;
    outline: none;
}

/* Button */
.password-card button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: #edf1ed;
    color: rgb(17, 15, 15);
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

.password-card button:hover {
    background: #45a049;
}

/* Message */
#message {
    text-align: center;
    margin-top: 10px;
    font-size: 14px;
}

/* Mobile Responsive */
@media (max-width: 480px) {
    .password-card {
        padding: 20px;
    }

    .password-card h2 {
        font-size: 18px;
    }

    .input-group input {
        padding: 8px;
    }

    .password-card button {
        padding: 10px;
    }
}

</style>

<!-- JS -->
<script src="{% static 'js/api.js' %}"></script>
<script src="{% static 'js/app.js' %}"></script>
<script src="{% static 'js/change_password.js' %}"></script>

{% endblock %}
